name: Deploy

# Runs on every push to main:
#   1. migrate       -> apply Supabase migrations (skipped if not configured)
#   2. deploy-frontend + deploy-backend -> run IN PARALLEL once migrate passes
#
# Each step activates only when its secret is set, so a partial setup still
# works and a missing secret skips gracefully instead of failing the run.
# Configure secrets in: repo Settings > Secrets and variables > Actions.
on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations (skips if secrets not set)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Supabase secrets not set — skipping migrations."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push

  deploy-frontend:
    name: Deploy frontend (Vercel)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook (skips if not set)
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK not set — skipping (Vercel may auto-deploy on push instead)."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"

  deploy-backend:
    name: Deploy backend (Render)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook (skips if not set)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set — skipping."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
